services:
  prometheus:
    image: prom/prometheus:latest
    container_name: image-api-prometheus
    network_mode: host
    volumes:
      - ./infra/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"

  grafana:
    image: grafana/grafana:latest
    container_name: image-api-grafana
    network_mode: host
    depends_on:
      - prometheus